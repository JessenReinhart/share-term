<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes"
    />
    <meta name="theme-color" content="#0b0e14" />
    <meta name="color-scheme" content="dark" />
    <title>share-term</title>
    <link rel="stylesheet" href="/vendor/xterm.css" />
    <style>
      :root {
        --bg: #0b0e14;
        --bg-soft: #11151f;
        --border: #1f2733;
        --fg: #c8d0dc;
        --muted: #6b7686;
        --ok: #98c379;
        --err: #e06c75;
        --accent: #56b6c2;
        --font: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          "Liberation Mono", monospace;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font);
        overflow: hidden;
        overscroll-behavior: none;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      /* Tiny floating connection indicator (replaces the navbar). */
      .status-dot {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 8px);
        left: calc(env(safe-area-inset-left) + 8px);
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--muted);
        transition: background 0.3s;
        z-index: 10;
        pointer-events: none;
      }
      .status-dot.online {
        background: var(--ok);
      }
      .status-dot.offline {
        background: var(--err);
      }

      /* Draggable floating action button for "Clear". */
      .fab {
        position: fixed;
        right: calc(env(safe-area-inset-right) + 14px);
        bottom: calc(env(safe-area-inset-bottom) + 14px);
        z-index: 10;
        font-family: var(--font);
        font-size: 12px;
        font-weight: 600;
        color: var(--fg);
        background: rgba(17, 21, 31, 0.82);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 9px 14px;
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
        backdrop-filter: blur(6px);
        /* We handle drag ourselves; stop the browser from scrolling/zooming. */
        touch-action: none;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
      }
      .fab.dragging {
        cursor: grabbing;
        opacity: 0.92;
      }

      #terminal {
        flex: 1 1 auto;
        padding: 6px 8px 10px;
        overflow: hidden;
      }
      /* xterm fills its container */
      #terminal .xterm {
        height: 100%;
      }

      /* Let the browser handle pinch-zoom / panning over the terminal instead
         of xterm swallowing all touch gestures (its viewport is touch-action:none
         by default, which blocks mobile zoom). */
      #terminal,
      #terminal .xterm,
      #terminal .xterm-viewport {
        touch-action: auto;
        -ms-touch-action: auto;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="terminal"></div>
    </div>

    <span id="dot" class="status-dot"></span>
    <button id="fab" class="fab">Clear</button>

    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script>
      "use strict";

      const term = new Terminal({
        fontFamily:
          'ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace',
        fontSize: 12,
        cursorBlink: true,
        allowProposedApi: true,
        theme: {
          background: "#0b0e14",
          foreground: "#c8d0dc",
          cursor: "#c8d0dc",
          cursorAccent: "#0b0e14",
          selectionBackground: "#23304a",
          black: "#1e1e1e",
          red: "#e06c75",
          green: "#98c379",
          yellow: "#e5c07b",
          blue: "#61afef",
          magenta: "#c678dd",
          cyan: "#56b6c2",
          white: "#c8d0dc",
          brightBlack: "#5c6370",
          brightRed: "#ef6f7b",
          brightGreen: "#a3d98c",
          brightYellow: "#ebd690",
          brightBlue: "#72b3f0",
          brightMagenta: "#d485e8",
          brightCyan: "#6cc4cf",
          brightWhite: "#ffffff",
        },
      });

      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(document.getElementById("terminal"));

      // When the laptop PTY reports its real width, we render at that many
      // columns and scale the font down so the whole width fits the screen
      // with no wrapping (wide TUIs would otherwise break box-drawing art).
      let targetCols = 0;

      function fitTerminal() {
        try {
          if (targetCols > 0) {
            fitTerminalToWidth(targetCols);
          } else {
            fit.fit();
          }
        } catch (_) {
          /* container not measurable yet */
        }
      }

      function fitTerminalToWidth(cols) {
        // 1. Fit at the current font size to learn how many columns the screen
        //    can hold — this is our baseline for the width/font-size ratio.
        fit.fit();
        const base = term.options.fontSize || 12;
        const dims = fit.proposeDimensions();
        const baseCols = dims && dims.cols ? dims.cols : cols;
        // 2. Scale the font so `cols` columns fill the screen width exactly.
        let next = base * (baseCols / cols) * 0.97;
        next = Math.max(4, Math.min(28, next));
        term.options.fontSize = next;
        // 3. Fit again: rows now fill the available height, no horizontal wrap.
        fit.fit();
      }
      fitTerminal();
      window.addEventListener("resize", fitTerminal);
      window.addEventListener("orientationchange", () =>
        setTimeout(fitTerminal, 200),
      );

      term.writeln("Waiting for connection…");
      term.writeln(
        "Connect this phone to the same Wi-Fi as your laptop, then scan",
      );
      term.writeln("the QR code shown in the terminal.");

      // ---- DOM refs --------------------------------------------------------
      const dotEl = document.getElementById("dot");
      const fab = document.getElementById("fab");

      // ---- Controls --------------------------------------------------------
      // The FAB is both a "Clear" button and a draggable handle. A short tap
      // clears the terminal; a drag (past a small threshold) just moves it so
      // it never permanently blocks the view.
      let fabDown = false;
      let fabMoved = false;
      let fabStartX = 0;
      let fabStartY = 0;
      let fabOffX = 0;
      let fabOffY = 0;

      fab.addEventListener("pointerdown", (e) => {
        fabDown = true;
        fabMoved = false;
        fabStartX = e.clientX;
        fabStartY = e.clientY;
        const r = fab.getBoundingClientRect();
        fabOffX = e.clientX - r.left;
        fabOffY = e.clientY - r.top;
        fab.setPointerCapture(e.pointerId);
        fab.classList.add("dragging");
      });

      fab.addEventListener("pointermove", (e) => {
        if (!fabDown) return;
        if (
          Math.abs(e.clientX - fabStartX) > 6 ||
          Math.abs(e.clientY - fabStartY) > 6
        ) {
          fabMoved = true;
        }
        if (!fabMoved) return;
        const w = window.innerWidth;
        const h = window.innerHeight;
        let x = e.clientX - fabOffX;
        let y = e.clientY - fabOffY;
        x = Math.max(0, Math.min(w - fab.offsetWidth, x));
        y = Math.max(0, Math.min(h - fab.offsetHeight, y));
        fab.style.left = x + "px";
        fab.style.top = y + "px";
        fab.style.right = "auto";
        fab.style.bottom = "auto";
      });

      function fabEnd(e) {
        if (!fabDown) return;
        fabDown = false;
        try {
          fab.releasePointerCapture(e.pointerId);
        } catch (_) {}
        fab.classList.remove("dragging");
        if (!fabMoved) term.clear();
      }
      fab.addEventListener("pointerup", fabEnd);
      fab.addEventListener("pointercancel", fabEnd);

      // ---- WebSocket (with auto-reconnect) --------------------------------
      let ws = null;
      let reconnectTimer = null;

      function setDot(state) {
        dotEl.className = "dot " + state;
      }

      function connect() {
        const proto = location.protocol === "https:" ? "wss://" : "ws://";
        const url = proto + location.host;

        setDot("");
        try {
          ws = new WebSocket(url);
        } catch (e) {
          scheduleReconnect();
          return;
        }

        ws.onopen = () => setDot("online");
        ws.onmessage = (ev) => {
          let msg;
          try {
            msg = JSON.parse(ev.data);
          } catch {
            return;
          }
          if (msg.type === "meta") {
            // filename previously shown in the navbar; intentionally dropped.
          } else if (msg.type === "size") {
            targetCols = msg.cols || 0;
            fitTerminal();
          } else if (msg.type === "line") {
            term.write(msg.text);
          }
        };
        ws.onclose = () => {
          setDot("offline");
          scheduleReconnect();
        };
        ws.onerror = () => {
          try {
            ws.close();
          } catch (_) {}
        };
      }

      function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connect();
        }, 1500);
      }

      connect();
    </script>
  </body>
</html>
