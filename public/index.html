<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0b0e14" />
    <meta name="color-scheme" content="dark" />
    <title>share-term</title>
    <link rel="stylesheet" href="/vendor/xterm.css" />
    <style>
      :root {
        --bg: #0b0e14;
        --bg-soft: #11151f;
        --border: #1f2733;
        --fg: #c8d0dc;
        --muted: #6b7686;
        --ok: #98c379;
        --err: #e06c75;
        --accent: #56b6c2;
        --font: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          "Liberation Mono", monospace;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font);
        overflow: hidden;
        overscroll-behavior: none;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: var(--bg-soft);
        border-bottom: 1px solid var(--border);
        flex: 0 0 auto;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--muted);
        transition: background 0.3s;
      }
      .dot.online {
        background: var(--ok);
      }
      .dot.offline {
        background: var(--err);
      }

      .title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .file {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }

      .btn {
        font-size: 11px;
        font-weight: 600;
        padding: 5px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--fg);
        cursor: pointer;
        user-select: none;
      }
      .btn:active {
        transform: scale(0.96);
      }

      #terminal {
        flex: 1 1 auto;
        padding: 6px 8px 10px;
        overflow: hidden;
      }
      /* xterm fills its container */
      #terminal .xterm {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <span id="dot" class="dot"></span>
        <span class="title">share-term</span>
        <span id="file" class="file"></span>
        <button id="clear" class="btn">Clear</button>
      </header>

      <div id="terminal"></div>
    </div>

    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script>
      "use strict";

      const term = new Terminal({
        fontFamily:
          'ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace',
        fontSize: 12,
        cursorBlink: true,
        allowProposedApi: true,
        theme: {
          background: "#0b0e14",
          foreground: "#c8d0dc",
          cursor: "#c8d0dc",
          cursorAccent: "#0b0e14",
          selectionBackground: "#23304a",
          black: "#1e1e1e",
          red: "#e06c75",
          green: "#98c379",
          yellow: "#e5c07b",
          blue: "#61afef",
          magenta: "#c678dd",
          cyan: "#56b6c2",
          white: "#c8d0dc",
          brightBlack: "#5c6370",
          brightRed: "#ef6f7b",
          brightGreen: "#a3d98c",
          brightYellow: "#ebd690",
          brightBlue: "#72b3f0",
          brightMagenta: "#d485e8",
          brightCyan: "#6cc4cf",
          brightWhite: "#ffffff",
        },
      });

      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(document.getElementById("terminal"));

      function fitTerminal() {
        try {
          fit.fit();
        } catch (_) {
          /* container not measurable yet */
        }
      }
      fitTerminal();
      window.addEventListener("resize", fitTerminal);
      window.addEventListener("orientationchange", () =>
        setTimeout(fitTerminal, 200),
      );

      term.writeln("Waiting for connection…");
      term.writeln(
        "Connect this phone to the same Wi-Fi as your laptop, then scan",
      );
      term.writeln("the QR code shown in the terminal.");

      // ---- DOM refs --------------------------------------------------------
      const dotEl = document.getElementById("dot");
      const fileEl = document.getElementById("file");
      const clearBtn = document.getElementById("clear");

      // ---- Controls --------------------------------------------------------
      clearBtn.addEventListener("click", () => term.clear());

      // ---- WebSocket (with auto-reconnect) --------------------------------
      let ws = null;
      let reconnectTimer = null;

      function setDot(state) {
        dotEl.className = "dot " + state;
      }

      function connect() {
        const proto = location.protocol === "https:" ? "wss://" : "ws://";
        const url = proto + location.host;

        setDot("");
        try {
          ws = new WebSocket(url);
        } catch (e) {
          scheduleReconnect();
          return;
        }

        ws.onopen = () => setDot("online");
        ws.onmessage = (ev) => {
          let msg;
          try {
            msg = JSON.parse(ev.data);
          } catch {
            return;
          }
          if (msg.type === "meta") {
            fileEl.textContent = msg.file || "";
          } else if (msg.type === "line") {
            term.write(msg.text);
          }
        };
        ws.onclose = () => {
          setDot("offline");
          scheduleReconnect();
        };
        ws.onerror = () => {
          try {
            ws.close();
          } catch (_) {}
        };
      }

      function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connect();
        }, 1500);
      }

      connect();
    </script>
  </body>
</html>
